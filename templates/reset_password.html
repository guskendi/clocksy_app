<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Clocksy — Nova senha</title>
<style>
:root{--bg:#f5f5f0;--surface:#fff;--border:#e0dfd8;--text:#1a1a1e;--text2:#6b6b72;--accent:#1a1a2e;--accent-light:#2d2d50;--red:#993c1d;--red-bg:#faece7;--radius:10px;--radius-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:36px 28px;width:100%;max-width:380px}
.logo{font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.desc{font-size:13px;color:var(--text2);margin-bottom:24px}
.group{margin-bottom:16px}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
input{width:100%;padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:15px;font-family:inherit}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(26,26,46,.1)}
.btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;margin-top:8px;transition:background .15s}
.btn:hover{background:var(--accent-light)}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;background:var(--red-bg);color:var(--red)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Clocksy</div>
  <p class="desc">Crie sua nova senha.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="group">
      <label>Nova senha</label>
      <input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6">
    </div>
    <div class="group">
      <label>Confirmar senha</label>
      <input type="password" name="password2" placeholder="Repita a senha" required>
    </div>
    <button type="submit" class="btn">Redefinir senha</button>
  </form>
</div>
</body>
</html>
